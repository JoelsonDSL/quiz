<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Profissional de Tubarões</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: rgba(0,0,0,0.75);
      padding: 20px;
      border-radius: 20px;
      width: 95%;
      max-width: 420px;
      text-align: center;
    }
    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }
    button {
      display: block;
      margin: 8px auto;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #00bfff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #009acd; }
    #nextBtn { display: none; background: #32cd32; }
    #feedback { font-weight: bold; margin-top: 10px; }
    #explanation { font-size: 14px; color: #ddd; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .progress {
      height: 8px;
      background: #555;
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #00ffcc;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <span id="lives">❤️❤️❤️</span>
    <span id="timer">⏱️ 30</span>
  </div>
  <div class="progress"><div class="progress-bar" id="progress"></div></div>
  <img id="image" src="" alt="tubarão">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <p id="feedback"></p>
  <p id="explanation"></p>
  <button id="nextBtn" onclick="nextQuestion()">Próxima</button>
</div>

<script>
const quiz = [
  {
    question: "Qual é o maior tubarão do mundo?",
    image: "https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",
    answers: ["Tubarão-branco", "Tubarão-baleia", "Tubarão-martelo"],
    correct: 1,
    explanation: "O tubarão-baleia é o maior peixe do planeta, podendo ultrapassar 12 metros de comprimento."
  },
  {
    question: "Tubarões pertencem a qual grupo?",
    image: "https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",
    answers: ["Osteíctes", "Condritas", "Anfíbios"],
    correct: 1,
    explanation: "Os tubarões pertencem à classe Chondrichthyes, caracterizada por esqueleto cartilaginoso e não ósseo."
  },
  {
    question: "Qual adaptação permite detectar presas?",
    image: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",
    answers: ["Visão noturna", "Ampolas de Lorenzini", "Linha lateral"],
    correct: 1,
    explanation: "As ampolas de Lorenzini permitem aos tubarões detectar campos elétricos gerados por outros organismos."
  }
];

let current = 0;
let score = 0;
let lives = 3;
let time = 30;
let timerInterval;

function startTimer() {
  clearInterval(timerInterval);
  time = 30;
  document.getElementById("timer").innerText = "⏱️ " + time;

  timerInterval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "⏱️ " + time;

    if (time <= 0) {
      clearInterval(timerInterval);
      loseLife();
    }
  }, 1000);
}

function updateLives() {
  document.getElementById("lives").innerText = "❤️".repeat(lives);
}

function updateProgress() {
  const percent = (current / quiz.length) * 100;
  document.getElementById("progress").style.width = percent + "%";
}

function loadQuestion() {
  const q = quiz[current];
  const img = document.getElementById("image");

  document.getElementById("question").innerText = q.question;
  img.src = q.image;

  // fallback se imagem falhar
  img.onerror = () => {
    img.src = "https://upload.wikimedia.org/wikipedia/commons/0/0b/Shark_icon.png";
  };

  const answersDiv = document.getElementById("answers");

  answersDiv.innerHTML = "";
  document.getElementById("feedback").innerText = "";
  document.getElementById("explanation").innerText = "";
  document.getElementById("nextBtn").style.display = "none";

  q.answers.forEach((ans, index) => {
    const btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick = () => checkAnswer(index);
    answersDiv.appendChild(btn);
  });

  updateProgress();
  startTimer();
}

function checkAnswer(index) {
  clearInterval(timerInterval);
  const q = quiz[current];
  const feedback = document.getElementById("feedback");
  const explanation = document.getElementById("explanation");

  if (index === q.correct) {
    score++;
    feedback.innerText = "✅ Correto!";
    feedback.style.color = "lightgreen";
  } else {
    feedback.innerText = "❌ Errado!";
    feedback.style.color = "salmon";
    loseLife();
  }

  explanation.innerText = q.explanation;
  document.getElementById("nextBtn").style.display = "block";

  document.querySelectorAll("#answers button").forEach(b => b.disabled = true);
}

function loseLife() {
  lives--;
  updateLives();

  if (lives <= 0) {
    endGame("💀 Você perdeu!");
  }
}

function nextQuestion() {
  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    endGame("🏆 Fim do jogo!");
  }
}

function endGame(msg) {
  document.querySelector(".container").innerHTML = `
    <h2>${msg}</h2>
    <p>Pontuação: ${score}/${quiz.length}</p>
    <button onclick="location.reload()">Jogar novamente</button>
  `;
}

updateLives();
loadQuestion();
</script>
</body>
</html>
