<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Profissional de Tubarões</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: rgba(0,0,0,0.8);
      padding: 30px;
      border-radius: 20px;
      width: 95%;
      max-width: 700px;
      min-height: 80vh;
      text-align: center;
    }
    img {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 10px;
    }
    button {
      display: block;
      margin: 8px auto;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #00bfff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #nextBtn { display: none; background: #32cd32; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .progress { height: 8px; background: #555; border-radius: 5px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: #00ffcc; }
  </style>
</head>
<body>
<div class="container" id="game">
  <h2>Escolha o nível</h2>
  <button onclick="startGame('facil')">Fácil</button>
  <button onclick="startGame('medio')">Médio</button>
  <button onclick="startGame('dificil')">Difícil</button>
</div>

<script>
const bancoQuestoes = {
  facil: Array.from({length:10}, (_,i)=>( {
    question: `Fácil ${i+1}: Tubarões são vertebrados?`,
    image: "https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",
    answers: ["Sim","Não","Depende"],
    correct: 0,
    explanation: "Tubarões possuem coluna vertebral cartilaginosa."
  })),

  medio: Array.from({length:10}, (_,i)=>( {
    question: `Médio ${i+1}: Tubarões pertencem a qual classe?`,
    image: "https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",
    answers: ["Osteichthyes","Chondrichthyes","Mammalia"],
    correct: 1,
    explanation: "São peixes cartilaginosos da classe Chondrichthyes."
  })),

  dificil: Array.from({length:10}, (_,i)=>( {
    question: `Difícil ${i+1}: Função ecológica dos tubarões?`,
    image: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",
    answers: ["Predador de topo","Produtor","Decompositor"],
    correct: 0,
    explanation: "Tubarões atuam como predadores de topo, regulando cadeias tróficas."
  }))
};

let quiz = [];
let current = 0;
let score = 0;
let lives = 3;
let time = 30;
let timerInterval;

function startGame(level){
  quiz = bancoQuestoes[level];
  document.getElementById("game").innerHTML = `
    <div class="top-bar">
      <span id="lives">❤️❤️❤️</span>
      <span id="timer">⏱️ 30</span>
    </div>
    <div class="progress"><div class="progress-bar" id="progress"></div></div>
    <img id="image">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <p id="feedback"></p>
    <p id="explanation"></p>
    <button id="nextBtn" onclick="nextQuestion()">Próxima</button>
  `;
  loadQuestion();
}

function startTimer(){
  clearInterval(timerInterval);
  time=30;
  timerInterval=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="⏱️ "+time;
    if(time<=0){clearInterval(timerInterval);loseLife();}
  },1000);
}

function loadQuestion(){
  const q=quiz[current];
  document.getElementById("question").innerText=q.question;
  document.getElementById("image").src=q.image;
  const answersDiv=document.getElementById("answers");

  answersDiv.innerHTML="";
  document.getElementById("feedback").innerText="";
  document.getElementById("explanation").innerText="";
  document.getElementById("nextBtn").style.display="none";

  q.answers.forEach((ans,i)=>{
    const btn=document.createElement("button");
    btn.innerText=ans;
    btn.onclick=()=>checkAnswer(i);
    answersDiv.appendChild(btn);
  });

  document.getElementById("progress").style.width=(current/quiz.length)*100+"%";
  startTimer();
}

function checkAnswer(i){
  clearInterval(timerInterval);
  const q=quiz[current];

  if(i===q.correct){score++;document.getElementById("feedback").innerText="✅ Correto!";}
  else{document.getElementById("feedback").innerText="❌ Errado!";loseLife();}

  document.getElementById("explanation").innerText=q.explanation;
  document.getElementById("nextBtn").style.display="block";

  document.querySelectorAll("#answers button").forEach(b=>b.disabled=true);
}

function loseLife(){
  lives--;
  document.getElementById("lives").innerText="❤️".repeat(lives);
  if(lives<=0) endGame("💀 Você perdeu!");
}

function nextQuestion(){
  current++;
  if(current<quiz.length) loadQuestion();
  else endGame("🏆 Fim do jogo!");
}

function endGame(msg){
  document.getElementById("game").innerHTML=`
    <h2>${msg}</h2>
    <p>Pontuação: ${score}/${quiz.length}</p>
    <button onclick="location.reload()">Jogar novamente</button>
  `;
}
</script>
</body>
</html>
