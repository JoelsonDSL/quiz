<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Tubarões</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      /* Imagem de fundo ajustada para cobrir toda a tela */
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center fixed;
      background-size: cover;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: rgba(0,0,0,0.85); /* Um pouco mais escuro para melhor leitura */
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px; /* Reduzi para ficar mais elegante */
      text-align: center;
      box-shadow: 0 10px 30px rgba(255,255,255,0.5);
    }
    /* Estilo da logo inicial */
    .logo-inicial {
      width: 100%;
      max-width: 300px;
      height: auto;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    /* Imagens das questões */
    #image {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 15px;
    }
    button {
      display: block;
      margin: 10px auto;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #00bfff;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    button:hover {
      background: #009acc;
      transform: scale(1.02);
    }
    #nextBtn { display: none; background: #32cd32; margin-top: 20px; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-weight: bold;
    }
    .progress { height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-bottom: 15px; }
    .progress-bar { height: 100%; width: 0%; background: #00ffcc; transition: width 0.3s; }
    #feedback { font-weight: bold; font-size: 1.2em; margin: 10px 0; }
    #explanation { font-style: italic; color: #ccc; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container" id="game">
  <img src="./logo.jpg" alt="Tubarões do Mistério" class="logo-inicial">
  <h2 style="margin-bottom: 20px;">Escolha o nível</h2>
  <button onclick="startGame('facil')">Fácil</button>
  <button onclick="startGame('medio')">Médio</button>
  <button onclick="startGame('dificil')">Difícil</button>
</div>

<script>
// O seu banco de questões permanece EXATAMENTE o mesmo
const bancoQuestoes = {
  facil: [
    {question:"Tubarões são animais vertebrados?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Depende"],correct:0,explanation:"Possuem coluna vertebral cartilaginosa."},
    {question:"Em qual ambiente eles vivem?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Água doce","Água salgada","Ambos"],correct:1,explanation:"A maioria vive em ambiente marinho."},
    {question:"Eles respiram através de?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Pulmões","Brânquias","Pele"],correct:1,explanation:"Respiram por brânquias."},
    {question:"Tubarões possuem ossos?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Poucos"],correct:1,explanation:"Seu esqueleto é cartilaginoso."},
    {question:"Qual formato da cauda ajuda na natação?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Assimétrica","Redonda","Quadrada"],correct:0,explanation:"A cauda heterocerca auxilia na propulsão."},
    {question:"Tubarões são carnívoros?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Onívoros"],correct:0,explanation:"Alimentam-se de outros animais."},
    {question:"Quantos sentidos básicos eles têm?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["3","5","7"],correct:2,explanation:"Possuem sentidos adicionais como eletrorecepção."},
    {question:"Tubarões fazem a troca dos dentes?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Raramente"],correct:0,explanation:"Substituem dentes continuamente."},
    {question:"Eles são peixes?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Depende"],correct:0,explanation:"São peixes cartilaginosos."},
    {question:"Tubarões têm um tipo de escama?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Poucas"],correct:0,explanation:"Possuem dentículos dérmicos."}
  ],
  medio: [ /* Seus dados do medio... */ ],
  dificil: [ /* Seus dados do dificil... */ ]
};

let quiz = [];
let current = 0;
let score = 0;
let lives = 3;
let time = 30;
let timerInterval;

function startGame(level){
  quiz = bancoQuestoes[level];
  current = 0;
  score = 0;
  lives = 3;
  
  // Limpa o container e prepara para as perguntas
  document.getElementById("game").innerHTML = `
    <div class="top-bar">
      <span id="lives">❤️❤️❤️</span>
      <span id="timer">⏱️ 30</span>
    </div>
    <div class="progress"><div class="progress-bar" id="progress"></div></div>
    <img id="image">
    <h2 id="question" style="font-size: 1.2rem;"></h2>
    <div id="answers"></div>
    <div id="feedback"></div>
    <div id="explanation"></div>
    <button id="nextBtn" onclick="nextQuestion()">Próxima Pergunta</button>
  `;
  loadQuestion();
}

function startTimer(){
  clearInterval(timerInterval);
  time=30;
  document.getElementById("timer").innerText="⏱️ "+time;
  timerInterval=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="⏱️ "+time;
    if(time<=0){
      clearInterval(timerInterval);
      checkAnswer(-1); // Estoura o tempo como resposta errada
    }
  },1000);
}

function loadQuestion(){
  const q = quiz[current];
  document.getElementById("question").innerText = q.question;
  document.getElementById("image").src = q.image;
  const answersDiv = document.getElementById("answers");

  answersDiv.innerHTML = "";
  document.getElementById("feedback").innerText = "";
  document.getElementById("explanation").innerText = "";
  document.getElementById("nextBtn").style.display = "none";

  q.answers.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick = () => checkAnswer(i);
    answersDiv.appendChild(btn);
  });

  document.getElementById("progress").style.width = (current / quiz.length) * 100 + "%";
  startTimer();
}

function checkAnswer(i){
  clearInterval(timerInterval);
  const q = quiz[current];
  const feedback = document.getElementById("feedback");

  if(i === q.correct){
    score++;
    feedback.innerText = "✅ Correto!";
    feedback.style.color = "#32cd32";
  } else {
    lives--;
    document.getElementById("lives").innerText = "❤️".repeat(lives);
    feedback.innerText = i === -1 ? "⏱️ Tempo esgotado!" : "❌ Errado!";
    feedback.style.color = "#ff4500";
    if(lives <= 0) {
       setTimeout(() => endGame("💀 Você perdeu todas as vidas!"), 1000);
       return;
    }
  }

  document.getElementById("explanation").innerText = q.explanation;
  document.getElementById("nextBtn").style.display = "block";
  document.querySelectorAll("#answers button").forEach(b => b.disabled = true);
}

function nextQuestion(){
  current++;
  if(current < quiz.length) loadQuestion();
  else endGame("🏆 Parabéns! Você concluiu o nível.");
}

function endGame(msg){
  document.getElementById("game").innerHTML = `
    <h2 style="margin-top:20px;">${msg}</h2>
    <p style="font-size: 1.5rem; margin: 20px 0;">Pontuação: ${score}/${quiz.length}</p>
    <button onclick="location.reload()">Voltar ao Início</button>
  `;
}
</script>
</body>
</html>
