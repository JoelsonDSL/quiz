<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz de Tubarões</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center center/cover;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: rgba(0,0,0,0.8);
      padding: 30px;
      border-radius: 20px;
      width: 95%;
      max-width: 700px;
      min-height: 80vh;
      text-align: center;
    }
    img {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 10px;
    }
    button {
      display: block;
      margin: 8px auto;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #00bfff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #nextBtn { display: none; background: #32cd32; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .progress { height: 8px; background: #555; border-radius: 5px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: #00ffcc; }
  </style>
</head>
<div class="container" id="game">

<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 20px; font-family: sans-serif;">

  <div style="width: 100%; display: flex; justify-content: center;">
    <img src="./logo.jpg" alt="Tubarões do Mistério" 
         style="width: 100%; max-width: 500px; height: auto; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
  </div>

  <h2 style="color: white; margin: 10px 0;">Escolha o nível</h2>

  <div style="display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px;">
    <button style="background-color: #00BFFF; border: none; padding: 15px; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">Fácil</button>
    <button style="background-color: #00BFFF; border: none; padding: 15px; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">Médio</button>
    <button style="background-color: #00BFFF; border: none; padding: 15px; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;">Difícil</button>
  </div>

</div>
  
  <h2>Escolha o nível</h2>
  <button onclick="startGame('facil')">Fácil</button>
  <button onclick="startGame('medio')">Médio</button>
  <button onclick="startGame('dificil')">Difícil</button>
</div>

<script>
const bancoQuestoes = {
  facil: [
    {question:"Tubarões são animais vertebrados?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Depende"],correct:0,explanation:"Possuem coluna vertebral cartilaginosa."},
    {question:"Em qual ambiente eles vivem?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Água doce","Água salgada","Ambos"],correct:1,explanation:"A maioria vive em ambiente marinho."},
    {question:"Eles respiram através de?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Pulmões","Brânquias","Pele"],correct:1,explanation:"Respiram por brânquias."},
    {question:"Tubarões possuem ossos?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Poucos"],correct:1,explanation:"Seu esqueleto é cartilaginoso."},
    {question:"Qual formato da cauda ajuda na natação?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Assimétrica","Redonda","Quadrada"],correct:0,explanation:"A cauda heterocerca auxilia na propulsão."},
    {question:"Tubarões são carnívoros?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Onívoros"],correct:0,explanation:"Alimentam-se de outros animais."},
    {question:"Quantos sentidos básicos eles têm?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["3","5","7"],correct:2,explanation:"Possuem sentidos adicionais como eletrorecepção."},
    {question:"Tubarões fazem a troca dos dentes?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Raramente"],correct:0,explanation:"Substituem dentes continuamente."},
    {question:"Eles são peixes?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Depende"],correct:0,explanation:"São peixes cartilaginosos."},
    {question:"Tubarões têm um tipo de escama?",image:"https://images.unsplash.com/photo-1560275619-4662e36fa65c?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Poucas"],correct:0,explanation:"Possuem dentículos dérmicos."}
  ],

  medio: [
    {question:"Tubarões pertencem a qual classe?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Osteichthyes","Chondrichthyes","Reptilia"],correct:1,explanation:"Classe dos peixes cartilaginosos."},
    {question:"Qual a estrutura presente no tubarão que detecta eletricidade?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Linha lateral","Ampolas de Lorenzini","Olhos"],correct:1,explanation:"Detectam campos elétricos."},
    {question:"Qual a função da linha lateral?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Visão","Pressão/vibração","Olfato"],correct:1,explanation:"Detecta movimento da água."},
    {question:"Quais os tipos de fecundação?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Externa","Interna","Mista"],correct:1,explanation:"Fecundação interna."},
    {question:"Qual é o nome do órgão reprodutor do macho?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Pênis","Clásper","Tentáculo"],correct:1,explanation:"Clásper usado na reprodução."},
    {question:"Qual a estratégia reprodutiva mais comum no grupo?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Ovoviviparidade","Viviparidade","Ambas"],correct:2,explanation:"Existem diferentes estratégias."},
    {question:"Qual a velocidade de crescimento?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Rápida","Lenta","Média"],correct:1,explanation:"Crescimento lento."},
    {question:"Qual o número de filhotes?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Muitos","Poucos","Nenhum"],correct:1,explanation:"Baixa fecundidade."},
    {question:"Sabemos que eles são predadores de topo, mas quem preda os tubarõwa?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Orcas","Golfinhos","Nenhum"],correct:0,explanation:"Orcas podem predar tubarões."},
    {question:"Qual a importância ecológica?",image:"https://images.unsplash.com/photo-1558980664-10ea0d0c3b8b?auto=format&fit=crop&w=800&q=60",answers:["Controle populacional","Produção","Decomposição"],correct:0,explanation:"Regulam cadeias tróficas."}
  ],

  dificil: [
    {question:"Tubarões são considerados?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["Predadores de topo","Consumidores primários","Produtores"],correct:0,explanation:"Estão no topo da cadeia alimentar."},
    {question:"Efeito da remoção de tubarões?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["Equilíbrio","Cascata trófica","Nenhum"],correct:1,explanation:"Provoca desequilíbrios ecológicos."},
    {question:"Estratégia K ou r?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["r","K","Ambas"],correct:1,explanation:"Estratégia K: crescimento lento."},
    {question:"Importância para pescarias?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["Negativa","Regulatória","Nenhuma"],correct:1,explanation:"Mantêm equilíbrio das populações."},
    {question:"Sensibilidade à sobrepesca?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["Alta","Baixa","Nula"],correct:0,explanation:"São altamente vulneráveis."},
    {question:"Taxa de reposição populacional?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["Alta","Baixa","Média"],correct:1,explanation:"Reposição lenta."},
    {question:"Impacto do finning?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["Neutro","Extinção","Equilíbrio"],correct:1,explanation:"Contribui para declínio populacional."},
    {question:"Indicadores ecológicos?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["Sim","Não","Parcial"],correct:0,explanation:"Indicam saúde do ecossistema."},
    {question:"Papel em recifes?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["Regulação","Produção","Destruição"],correct:0,explanation:"Controlam populações de presas."},
    {question:"Consequência da extinção local?",image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=800&q=60",answers:["Estabilidade","Desequilíbrio","Nada"],correct:1,explanation:"Provoca cascatas tróficas."}
  ]
};

let quiz = [];
let current = 0;
let score = 0;
let lives = 3;
let time = 30;
let timerInterval;

function startGame(level){
  quiz = bancoQuestoes[level];
  document.getElementById("game").innerHTML = `
    <div class="top-bar">
      <span id="lives">❤️❤️❤️</span>
      <span id="timer">⏱️ 30</span>
    </div>
    <div class="progress"><div class="progress-bar" id="progress"></div></div>
    <img id="image">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <p id="feedback"></p>
    <p id="explanation"></p>
    <button id="nextBtn" onclick="nextQuestion()">Próxima</button>
  `;
  loadQuestion();
}

function startTimer(){
  clearInterval(timerInterval);
  time=30;
  timerInterval=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="⏱️ "+time;
    if(time<=0){clearInterval(timerInterval);loseLife();}
  },1000);
}

function loadQuestion(){
  const q=quiz[current];
  document.getElementById("question").innerText=q.question;
  document.getElementById("image").src=q.image;
  const answersDiv=document.getElementById("answers");

  answersDiv.innerHTML="";
  document.getElementById("feedback").innerText="";
  document.getElementById("explanation").innerText="";
  document.getElementById("nextBtn").style.display="none";

  q.answers.forEach((ans,i)=>{
    const btn=document.createElement("button");
    btn.innerText=ans;
    btn.onclick=()=>checkAnswer(i);
    answersDiv.appendChild(btn);
  });

  document.getElementById("progress").style.width=(current/quiz.length)*100+"%";
  startTimer();
}

function checkAnswer(i){
  clearInterval(timerInterval);
  const q=quiz[current];

  if(i===q.correct){score++;document.getElementById("feedback").innerText="✅ Correto!";}
  else{document.getElementById("feedback").innerText="❌ Errado!";loseLife();}

  document.getElementById("explanation").innerText=q.explanation;
  document.getElementById("nextBtn").style.display="block";

  document.querySelectorAll("#answers button").forEach(b=>b.disabled=true);
}

function loseLife(){
  lives--;
  document.getElementById("lives").innerText="❤️".repeat(lives);
  if(lives<=0) endGame("💀 Você perdeu!");
}

function nextQuestion(){
  current++;
  if(current<quiz.length) loadQuestion();
  else endGame("🏆 Fim do jogo!");
}

function endGame(msg){
  document.getElementById("game").innerHTML=`
    <h2>${msg}</h2>
    <p>Pontuação: ${score}/${quiz.length}</p>
    <button onclick="location.reload()">Jogar novamente</button>
  `;
}
</script>
</body>
</html>
